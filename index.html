<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0c10" />
    <meta name="description" content="Track your 42-day Whole Life Challenge — daily nutrition, exercise, mobility, sleep, hydration, wellbeing, and reflection." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WLC" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:title" content="Whole Life Challenge Tracker" />
    <meta property="og:description" content="Track your 42-day Whole Life Challenge — daily nutrition, exercise, mobility, sleep, hydration, wellbeing, and reflection." />
    <meta property="og:type" content="website" />
    <title>Whole Life Challenge Tracker</title>
    <script>
      (function() {
        var t = localStorage.getItem('wlc-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
